version: "3.9"

services:
  app:
    image: arthwt/soluvia:latest
    environment:
      - APP_NAME=Soluvia
      - APP_ENV=production
      - APP_KEY=
      - APP_DEBUG=false
      - APP_URL=

      - DB_CONNECTION=pgsql
      - DB_HOST=
      - DB_PORT=5432
      - DB_DATABASE=
      - DB_USERNAME=
      - DB_PASSWORD=

      - REDIS_CLIENT=phpredis
      - REDIS_HOST=
      - REDIS_PORT=6379
      - REDIS_PASSWORD=

      - SESSION_DRIVER=redis
      - SESSION_LIFETIME=120
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=redis

      - LOG_CHANNEL=stderr
      - LOG_LEVEL=error
      - FILESYSTEM_DISK=local

      - META_APP_ID=
      - META_APP_SECRET=
      - META_GRAPH_API_VERSION=v25.0
      - META_CONFIGURATION_ID=
      - META_REDIRECT_URI=
      - META_SYSTEM_USER_TOKEN=

    networks:
      - traefik_public
      - interna

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        - traefik.http.routers.soluvia.rule=Host(``)
        - traefik.http.routers.soluvia.entrypoints=websecure
        - traefik.http.routers.soluvia.tls.certresolver=le
        - traefik.http.routers.soluvia.service=soluvia
        - traefik.http.services.soluvia.loadbalancer.server.port=80
        - traefik.http.services.soluvia.loadbalancer.passhostheader=true

networks:
  traefik_public:
    external: true
    name: traefik_public
  interna:
    external: true
    name: interna
